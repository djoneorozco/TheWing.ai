    #sass-front-strip,

      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #sass-shell {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 10px 0 10px;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #e9ecff;
    }

    #sass-input-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      #sass-input-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      #sass-input-row {
        grid-template-columns: 1fr;
      }
    }

    .sass-field-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #a8b0d6;
      letter-spacing: .1em;
      margin-bottom: 5px;
      display: block;
    }

    .sass-select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(12,14,25,0.65);
      backdrop-filter: blur(4px);
      color: #e9ecff;
      font-size: 14px;
      outline: none;
      transition: 0.15s ease;
      appearance: auto;
    }

    .sass-select:focus {
      border-color: #8ef3c5;
      box-shadow: 0 0 0 1px rgba(142,243,197,.25);
    }

    .sass-select option,
    .sass-select optgroup {
      background: #0c0e19;
      color: #e9ecff;
    }

    #sass-new-base-stack {
      position: relative;
      width: 320px;
      max-width: 88vw;
      height: 42px;
      margin: 22px auto 0;
      border-radius: 999px;
    }

    #sass-new-base {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      background: transparent;
      z-index: 10;
    }

    #sass-new-base-shell {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      border-radius: 999px;
      background: radial-gradient(circle at top left, #8ef3c5, #6aa7ff);
      box-shadow: 0 14px 30px rgba(0,0,0,.80);
      transition: 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #050712;
      line-height: 1;
      user-select: none;
    }

    #sass-new-base-stack:hover #sass-new-base-shell {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    #sass-new-base-stack:focus-within #sass-new-base-shell {
      box-shadow:
        0 14px 30px rgba(0,0,0,.80),
        0 0 0 2px rgba(142,243,197,.30);
    }

    #sass-new-base-text {
      padding: 0 46px 0 24px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      text-align: center;
    }

    #sass-new-base-caret {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: .9;
    }

    #sass-launch-status {
      display: none;
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.4;
      color: #8ef3c5;
      text-align: center;
      letter-spacing: .02em;
    }

    #sass-launch-status.sass-status-active {
      display: block;
    }

    .sass-hidden {
      display: none !important;
    }

      function canonicalBaseName(raw) {
        var s = String(raw || "").trim();
        if (!s) return "";
        if (BASE_META[s]) return s;
        return BASE_ALIASES[s] || "";
      }

      function resolveBaseMeta(raw, label) {
        var canonical = canonicalBaseName(raw);
        if (!canonical || !BASE_META[canonical]) {
          alert("Unknown " + label + " selection. Please choose a supported base from the list.");
          console.error("[PCS Embed] Unknown base for " + label + ":", raw);
          return null;
        }
        return BASE_META[canonical];
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function populateBaseSelect(selectEl, placeholderText) {
        if (!selectEl) return;

        var html = "";

        if (placeholderText) {
          html += '<option value="" selected>' + escapeHtml(placeholderText) + '</option>';
        }

        BASES.forEach(function(base) {
          html += '<option value="' + escapeHtml(base.value) + '">' + escapeHtml(base.value) + '</option>';
        });

        selectEl.innerHTML = html;
      }

        return document.getElementById(id);

      var launchStatus = getEl("sass-launch-status");

      populateBaseSelect(currentBaseSel, "Select Current Base");
      populateBaseSelect(newBaseSel, "Select New Base Location");

        var rank = String(rankSel && rankSel.value ? rankSel.value : "").trim();
        var yos = String(yosSel && yosSel.value ? yosSel.value : "").trim();
        var fam = String(familySel && familySel.value ? familySel.value : "").trim();
        var curBaseRaw = String(currentBaseSel && currentBaseSel.value ? currentBaseSel.value : "").trim();

        if (!rank) {

          if (currentBaseSel) currentBaseSel.focus();

      function launchSnapshot() {
        var rank = String(rankSel && rankSel.value ? rankSel.value : "").trim();
        var yos = String(yosSel && yosSel.value ? yosSel.value : "").trim();
        var fam = String(familySel && familySel.value ? familySel.value : "").trim();
        var curBaseRaw = String(currentBaseSel && currentBaseSel.value ? currentBaseSel.value : "").trim();
        var newBaseRaw = String(newBaseSel && newBaseSel.value ? newBaseSel.value : "").trim();

        if (!validateProfileInputs()) return;

        if (!newBaseRaw) {
          if (newBaseText) newBaseText.textContent = "Select New Base Location";
          return;
        }

        var curMeta = resolveBaseMeta(curBaseRaw, "Current Base");
        var newMeta = resolveBaseMeta(newBaseRaw, "New Base");
        if (!curMeta || !newMeta) {
          if (newBaseSel) newBaseSel.value = "";
          if (newBaseText) newBaseText.textContent = "Select New Base Location";
          return;
        }

        var curBase = curMeta.label;
        var newBase = newMeta.label;

        if (curBase === newBase) {
          alert("Current Base and New Base cannot be the same. Please select a different destination base.");
          if (newBaseSel) newBaseSel.value = "";
          if (newBaseText) newBaseText.textContent = "Select New Base Location";
          return;
        }

        var curFileKey = curMeta.fileKey;
        var newFileKey = newMeta.fileKey;
        var curZip = curMeta.zip;
        var newZip = newMeta.zip;

        try {
          sessionStorage.setItem("pcs_rank", rank);
          sessionStorage.setItem("pcs_yos", yos);
          sessionStorage.setItem("pcs_family", fam);

          sessionStorage.setItem("pcs_current_base", curBase);
          sessionStorage.setItem("pcs_current_cityKey", curFileKey);
          sessionStorage.setItem("pcs_current_fileKey", curFileKey);
          sessionStorage.setItem("pcs_current_zip", curZip);

          sessionStorage.setItem("pcs_new_base", newBase);
          sessionStorage.setItem("pcs_new_cityKey", newFileKey);
          sessionStorage.setItem("pcs_new_fileKey", newFileKey);
          sessionStorage.setItem("pcs_new_zip", newZip);
        } catch (e) {
          console.warn("[PCS Embed] sessionStorage unavailable; URL params will carry the handoff.");
        }

        if (newBaseText) {
          newBaseText.textContent = newBase;
        }

        if (launchStatus) {
          launchStatus.classList.add("sass-status-active");
          launchStatus.textContent = "Building your PCS Snapshot for " + newBase + "...";
        }

        var params = new URLSearchParams();

        params.set("type", "ad");
        params.set("rank", rank);
        params.set("yos", yos);
        params.set("family", fam);

        params.set("base", newBase);
        params.set("cityKey", newFileKey);

        params.set("curBase", curBase);
        params.set("newBase", newBase);

        params.set("curCityKey", curFileKey);
        params.set("newCityKey", newFileKey);

        params.set("curFileKey", curFileKey);
        params.set("newFileKey", newFileKey);

        params.set("curZip", curZip);
        params.set("newZip", newZip);

        params.set("currentBase", curBase);
        params.set("currentLocation", curBase);
        params.set("destinationBase", newBase);
        params.set("newLocation", newBase);

        window.location.href = SNAPSHOT_BASE_URL + "?" + params.toString();
      }

      if (newBaseSel) {
        newBaseSel.addEventListener("mousedown", function(e) {
          if (!validateProfileInputs()) {
            e.preventDefault();
            return false;
          }
        });

        newBaseSel.addEventListener("touchstart", function(e) {
          if (!validateProfileInputs()) {
            e.preventDefault();
            return false;
          }
        }, { passive: false });

        newBaseSel.addEventListener("change", function() {
          var selectedText = String(newBaseSel.value || "").trim();

          if (newBaseText) {
            newBaseText.textContent = selectedText || "Select New Base Location";
          }

          if (selectedText) {
            launchSnapshot();
          }
        });
      }
    })();
  </script>
</div>
